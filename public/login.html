<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Login | PROFICOD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/login.css" />
  <style>
    .login-error {
      font-size: 13px;
      color: #dc2626;
      margin-top: 6px;
      min-height: 16px;
    }
  </style>
</head>
<body>
<div class="login-layout">
  <!-- LADO IZQUIERDO -->
  <div class="login-left">
    <h1>Bienvenido a <span>PROFICOD</span></h1>
    <div class="mock-image">
      <div class="circle"></div>
      <div class="card fake"></div>
      <div class="card fake small"></div>
    </div>
  </div>
  <!-- LADO DERECHO -->
  <div class="login-right">
    <div class="login-box">
      <h2>Inicia sesión en tu cuenta</h2>
      <p class="login-subtitle small">
        Bienvenido, ingresa tus datos de inicio de sesión
      </p>
      <label>Email</label>
      <input id="email" type="email" placeholder="usuario@correo.com" />
      <label>Contraseña</label>
      <input id="password" type="password" />
      <!-- MENSAJE DE ERROR -->
      <div id="error" class="login-error"></div>
      <div class="remember-row">
        <label class="remember-label">
          <input type="checkbox" id="remember">
          <span>Recuérdame</span>
        </label>
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>
      <button type="button" onclick="login()">Inicia sesión</button>
    </div>
  </div>
</div>
<script>
const API = "https://profit-cod.onrender.com/api";
window.login = async function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const error = document.getElementById("error");
  error.textContent = "";
  if (!email || !password) {
    error.textContent = "Usuario o contraseña incorrectos";
    return;
  }
  try {
    const res = await fetch(API + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 403) {
        error.textContent = "Tu cuenta está desactivada. Contacta al administrador.";
      } else {
        error.textContent = "Usuario o contraseña incorrectos";
      }
      return;
    }
    localStorage.setItem("token", data.token);
    localStorage.setItem("role", data.user.role);
    window.location.href = "/";
  } catch (e) {
    console.error(e);
    error.textContent = "Error de conexión";
  }
};
</script>
</body>
</html>
