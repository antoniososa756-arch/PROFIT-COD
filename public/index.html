<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
   <title>PROFIT COD</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2316a34a'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='20' fill='white'>P</text></svg>">

  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">

  <!-- 🔐 PROTECCIÓN DEL PANEL (CORRECTA) -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.replace("/login.html");
      return;
    }

    // Verificamos token real (admin o cliente)
    fetch("/api/auth/me", {
      headers: {
        "Authorization": "Bearer " + token
      }
    })
    .then(res => {
      if (!res.ok) {
        localStorage.clear();
        window.location.replace("/login.html");
      }
    })
    .catch(() => {
      localStorage.clear();
      window.location.replace("/login.html");
    });
  });
</script>

</head>

<body>

  <!-- ⚠️ AQUÍ SE MONTA TU PANEL REAL -->
  <div id="app"></div>

  <!-- TU FRONTEND ORIGINAL -->
  <script src="/js/app.js"></script>

  <script>
    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("role");
      window.location.replace("/login.html");
    }
  </script>

<!-- MODAL PASO 4 - CONECTAR TIENDA CON PROFITCOD -->
<div id="shopifyStep4" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  z-index:3400;
  align-items:center;
  justify-content:center;
">

  <div style="
    background:#fff;
    width:520px;
    max-width:92%;
    border-radius:12px;
    padding:22px;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
  ">

    <h3 style="margin-top:0;">Conectar tienda Shopify con PROFITCOD</h3>

    <p style="font-size:14px;color:#444;margin-bottom:16px;">
  Introduce los datos de tu tienda para sincronizar pedidos automáticamente con PROFITCOD.
</p>

    <div style="display:flex;flex-direction:column;gap:12px;">

      <div>
        <label style="font-size:13px;font-weight:600;">Dominio de la tienda</label>
        <input
          id="pf-shop-domain"
          placeholder="tutienda.myshopify.com"
          style="width:100%;padding:10px;border-radius:8px;border:1px solid #d1d5db;"
        />
      </div>

      <div>
        <label style="font-size:13px;font-weight:600;">Access Token</label>
        <input
          id="pf-access-token"
          placeholder="shpat_xxxxxxxxxxxxxxxxxxxxxxxx"
          style="width:100%;padding:10px;border-radius:8px;border:1px solid #d1d5db;"
        />
        <div style="font-size:12px;color:#6b7280;margin-top:4px;">
          Encuéntralo en Shopify → Configuración → Apps → Tu app privada
        </div>
      </div>

    </div>

    <div style="font-size:12px;color:#16a34a;margin-top:10px;">
      ✔ PROFITCOD nunca solicita tu contraseña de Shopify
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px;">
      <button
        onclick="closeShopifyStep4()"
        style="
          background:transparent;
          border:none;
          color:#6b7280;
          font-size:14px;
          cursor:pointer;
        "
      >
        Cancelar
      </button>

      <button
        onclick="submitShopifyConnection()"
        style="
          background:#16a34a;
          color:#fff;
          border:none;
          padding:10px 16px;
          border-radius:8px;
          font-weight:600;
          cursor:pointer;
        "
      >
        Conectar tienda →
      </button>
    </div>

  </div>
</div>

</body>
</html>
