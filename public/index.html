<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>App</title>

  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">

  <!-- 🔐 PROTECCIÓN DEL PANEL (CORRECTA) -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.replace("/login.html");
      return;
    }

    // Verificamos token real (admin o cliente)
    fetch("/api/auth/me", {
      headers: {
        "Authorization": "Bearer " + token
      }
    })
    .then(res => {
      if (!res.ok) {
        localStorage.clear();
        window.location.replace("/login.html");
      }
    })
    .catch(() => {
      localStorage.clear();
      window.location.replace("/login.html");
    });
  });
</script>

</head>

<body>

  <!-- ⚠️ AQUÍ SE MONTA TU PANEL REAL -->
  <div id="app"></div>

  <!-- TU FRONTEND ORIGINAL -->
  <script src="/js/app.js"></script>

  <script>
    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("role");
      window.location.replace("/login.html");
    }
  </script>

</body>
</html>
