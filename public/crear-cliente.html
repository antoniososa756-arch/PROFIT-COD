<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Crear cliente</title>
</head>
<body>

  <h1>Crear cliente</h1>

  <form id="createClientForm">
    <label>
      Email:
      <input type="email" id="email" required />
    </label>
    <br><br>

    <label>
      Contraseña:
      <input type="password" id="password" required />
    </label>
    <br><br>

    <button type="submit">Crear cliente</button>
  </form>

  <p id="result"></p>

  <script src="/js/crear-cliente.js"></script>
</body>
</html>
